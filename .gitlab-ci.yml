# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json

include:
  - project: tools/shared-pipelines
    ref: v6.0.3
    file: /base/base.yaml
    inputs:
      ignored_licenses:
        - BlueOak-1.0.0
        - BUSL-1.1
        - LGPL-3.0-only
        - LGPL-3.0-or-later
  - project: tools/shared-pipelines
    ref: v6.0.3
    file: /nodejs/nodejs.yaml
  - project: tools/shared-pipelines
    ref: v6.0.3
    file: /docker/docker.yaml

# Prepare
prepare-precache:
  extends: .prepare-nodejs-precache

# Analysis - general
analysis-spell-check:
  extends: .analysis-base-spell-check

analysis-licenses:
  extends: .analysis-nodejs-licenses

analysis-security:
  extends: .analysis-nodejs-security

# Analysis - style
analysis-lint:
  extends: .analysis-nodejs-lint

analysis-format:
  extends: .analysis-nodejs-format

analysis-typescript:
  extends: .analysis-nodejs-typescript

# Build
build:
  extends: .build-nodejs-pnpm

build-npm:
  needs:
    - build
  stage: build
  extends: .publish-nodejs-pnpm-preview

build-docker:
  needs:
    - build
  stage: build
  extends: .publish-docker-preview
  variables:
    DOCKERFILE: Dockerfile

# Test
test:
  variables:
    ADMIN_EMAIL: "admin@example.com"
    ADMIN_PASSWORD: "d1r3ctu5"
    DIRECTUS_URL: "http://directus:8055"
  services:
    - name: container-cache.registry.foldland.io/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/preview:$CI_COMMIT_SHORT_SHA
      alias: directus
  before_script:
    - !reference [ .setup-nodejs-pnpm, before_script ]
    # setup .env
    - printenv > .env
    - bash tools/generate_tokens.sh
  extends: .test-nodejs-vitest

# Publish
publish-npm-production:
  extends: .publish-nodejs-pnpm-production

publish-container-production:
  extends: .publish-docker-production
  variables:
    DOCKERFILE: Dockerfile

# Release
release-prepare-mr:
  extends:
    - .release-prepare-mr

release-tag:
  extends:
    - .release-tag
